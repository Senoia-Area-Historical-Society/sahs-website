name: Check Firebase Config

on:
  pull_request:
    paths:
      - 'firebase.json'

jobs:
  check_firestore_database_target:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check Firestore database target
        run: node scripts/check-firestore-database-target.cjs
